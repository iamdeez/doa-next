settlements.settlement_items|stg_settlements_settlement_items|AP|FULL|-|settlement-service

# --- admin 스키마 (2) ---
admin.banners|stg_admin_banners|C|FULL|-|banner-service
admin.admin_audit_logs|stg_admin_admin_audit_logs|A|WATERMARK|createdAt|admin-service

