# 020-data-migration-cutover — 델타 캡처 per-table 부류 매핑 설정 (T004)
#
# 출처: MAPPING-SPEC.md §6(델타 캡처 per-table 최종 분류). 컬럼 shape 은 sql/00_staging_ddl.sql 이
# 유일한 소스(중복 기재 금지) — 본 파일은 "어떤 테이블을 어떤 델타 방식으로 처리하는가"만 규정한다.
#
# 형식(파이프 구분, 주석/빈 줄 무시):
#   schema.table | stg_table | mapping_class | behavior | watermark_col | legacy_service
#
#   mapping_class : MAPPING-SPEC §6 표기 그대로(A/AP=A′/B/C/C2=C″) — 문서 대조용, 스크립트 분기에는
#                   미사용(분기는 behavior 컬럼 기준).
#   behavior      : WATERMARK(증분 append, watermark_col 기준) | FULL(윈도우 내 full re-copy — truncate+재적재)
#                   research.md ADR-004: id 워터마크는 cuid 비단조라 사용 금지 — WATERMARK 는 항상
#                   createdAt/updatedAt/viewedAt 등 timestamp 컬럼 기준.
#   watermark_col : behavior=WATERMARK 일 때만 유효. FULL 인 행은 "-".
#                   AP(A′) 부류는 자체 timestamp 가 없어 기본값을 FULL(부모와 동반 full re-copy,
#                   research.md S3/ADR-004 명시 대안)로 채택 — extract.sh 쿼리 파일에서 부모 join
#                   증분으로 커스터마이즈 가능(선택, §extract.sh 참조).
#   legacy_service: extract.sh --service 필터 키. MAPPING-SPEC.md §0 관례상 자리표시(<module>-service).
#                   실행 시 사용자가 실제 레거시 서비스명으로 교체(레거시는 서비스별 개별 RDS — FR-001).
#
# 스킵 4종(GAP-020-01 RESOLVED, MAPPING-SPEC.md §2)은 이관 대상이 아니므로 본 설정에 포함하지
# 않는다: users.refresh_tokens · users.password_reset_otps · users.oauth_states · payments.payment_outbox.
# (10_transform.sql·20_verify.sql 도 동일하게 4종을 다루지 않는다.)

# --- users 스키마 (7) ---
users.users|stg_users_users|C|FULL|-|auth-service
users.social_accounts|stg_users_social_accounts|A|WATERMARK|createdAt|auth-service
users.sellers|stg_users_sellers|C|FULL|-|seller-service
users.addresses|stg_users_addresses|C|FULL|-|user-service
users.wishlists|stg_users_wishlists|A|WATERMARK|createdAt|user-service
users.product_views|stg_users_product_views|B|WATERMARK|viewedAt|user-service
users.notifications|stg_users_notifications|C|FULL|-|notification-service

# --- products 스키마 (6) ---
products.categories|stg_products_categories|C2|FULL|-|product-service
products.products|stg_products_products|C|FULL|-|product-service
products.product_images|stg_products_product_images|C2|FULL|-|product-service
products.variants|stg_products_variants|C2|FULL|-|product-service
products.inventory|stg_products_inventory|C2|FULL|-|inventory-service
products.inventory_logs|stg_products_inventory_logs|A|WATERMARK|createdAt|inventory-service

# --- commerce 스키마 (4 + 카트 아이템 보조 스테이징 1) ---
commerce.carts|stg_commerce_carts|B|WATERMARK|updatedAt|cart-service
# 보조: carts.items(JSONB) 조립 원천(MAPPING-SPEC §8-1). 그 자체는 33테이블에 속하지 않으며 부모
# (commerce.carts)와 함께 항상 재적재 — 아이템 단위 워터마크를 별도로 두지 않는다(단순화).
commerce.cart_items|stg_commerce_cart_items|AUX|FULL|-|cart-service
commerce.coupons|stg_commerce_coupons|C|FULL|-|coupon-service
commerce.user_coupons|stg_commerce_user_coupons|C|FULL|-|coupon-service
commerce.reviews|stg_commerce_reviews|B|WATERMARK|updatedAt|review-service

# --- orders 스키마 (5) ---
orders.orders|stg_orders_orders|C|FULL|-|order-service
orders.order_items|stg_orders_order_items|AP|FULL|-|order-service
orders.order_events|stg_orders_order_events|A|WATERMARK|createdAt|order-service
orders.shipments|stg_orders_shipments|C|FULL|-|shipping-service
